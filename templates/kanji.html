<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kanji List</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        .kanji-char {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }
    </style>
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">Kanji Card Explorer</h1>
                <p class="text-muted mb-0">Data server-side render dari kanjiapi.dev</p>
            </div>
            <a href="/" class="btn btn-outline-secondary">Kembali</a>
        </div>

        {% if data %}
        <div class="row g-3">
            {% for item in data %}
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <div class="text-muted small mb-2">#{{ forloop.counter }}</div>
                        <div class="kanji-char mb-2">{{ item }}</div>
                        <span class="badge text-bg-primary">JLPT N5</span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="alert alert-warning">Data kosong atau API eksternal sedang tidak tersedia.</div>
        {% endif %}
    </main>
</body>
</html>
